<!DOCTYPE html>
<html>
<head>

<title>Draft Send Sign</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
text-align:center;
}

.hero{
padding:100px 20px;
animation:fadeIn 1.2s ease;
}

.logo{
width:200px;
margin-bottom:30px;
filter:drop-shadow(0px 10px 30px rgba(239,68,68,0.4));
}

h1{
font-size:50px;
color:#ef4444;
margin-bottom:10px;
}

h2{
color:#e2e8f0;
font-weight:600;
margin-bottom:30px;
}

.event-info{
font-size:20px;
line-height:1.8;
margin-bottom:40px;
}

.button{
display:inline-block;
background:#22c55e;
color:black;
padding:18px 36px;
border-radius:12px;
font-weight:bold;
font-size:20px;
text-decoration:none;
transition:all .2s ease;
box-shadow:0px 8px 25px rgba(34,197,94,0.4);
}

.button:hover{
background:#16a34a;
transform:translateY(-3px);
box-shadow:0px 12px 35px rgba(34,197,94,0.6);
}

.ticket-note{
margin-top:20px;
color:#cbd5f5;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.features{
margin-top:80px;
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.feature{
background:#1e293b;
padding:30px;
border-radius:14px;
width:230px;
box-shadow:0px 10px 30px rgba(0,0,0,0.5);
transition:.2s;
}

.feature:hover{
transform:translateY(-6px);
}

.feature h3{
color:#ef4444;
}

.photo{
margin-top:70px;
width:85%;
max-width:750px;
border-radius:16px;
box-shadow:0px 15px 50px rgba(0,0,0,0.6);
}

.footer{
margin-top:70px;
color:#94a3b8;
font-size:14px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="hero">

<img src="assets/DSSLogo.png" class="logo">

<h1>Draft. Send. Sign.</h1>

<p class="tagline">
Create and sign legally binding agreements in minutes.
</p>

<p class="coming">
🚀 Coming Soon
</p>

<a href="/crawfish-boil" class="button">
Crawfish Boil Event
</a>

<div class="footer">

<p>
Powered by
<a href="https://ndaexpress.com">NDAExpress</a>
</p>

</div>

</div>

</body>
</html>
